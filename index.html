<!DOCTYPE html>

<head>

    <title>SteamView</title>

    <!-- Bootstrap CSS -->

    <!-- Style CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/index.css">

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

                    </div>

                    <li class="nav-item mx-2"><a class="nav-link" href="noticias.html">Noticias</a></li>
